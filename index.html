<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meal Planner</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">

    <!-- ===== HEADER ===== -->
    <header class="header">
      <h1>Meal Planner</h1>
      <div class="header-controls">
        <div class="viewing-as" id="viewing-as"></div>
        <button class="btn btn-request header-btn" id="food-request-btn">+ Request</button>
        <div class="week-dropdown" id="week-dropdown">
          <button class="week-dropdown-btn" id="week-dropdown-btn">
            <span id="week-label"></span><span class="week-caret"> ▾</span>
          </button>
          <div class="week-dropdown-menu" id="week-dropdown-menu" hidden></div>
        </div>
        <button class="btn header-btn" id="lock-btn" hidden>Lock Week</button>
      </div>
    </header>

    <div class="locked-banner" id="locked-banner" hidden>
      This week is locked — you're planning next week
    </div>

    <!-- ===== MAIN LAYOUT: content + sidebar (meals on RHS) ===== -->
    <div class="layout">

      <!-- --- Main content: all days stacked --- -->
      <main class="content" id="week-grid">
        <!-- Populated by JS: all 7 days stacked vertically -->
      </main>

      <!-- --- Sidebar on the RIGHT: meal menu + actions --- -->
      <aside class="sidebar">
        <h2 class="sidebar-title">Meals</h2>
        <input type="text" id="meal-search" class="meal-search" placeholder="Filter meals..." autocomplete="off">
        <div class="meal-list" id="meal-list">
          <!-- Populated by JS: draggable meal cards -->
        </div>
      </aside>
    </div>

    <!-- ===== SHOPPING LIST MODAL ===== -->
    <div class="modal-overlay" id="shopping-modal-overlay" hidden>
      <div class="modal">
        <div class="modal-header">
          <h2>Shopping List — Tesco Weekly Shop</h2>
          <button class="modal-close" id="shopping-modal-close">&times;</button>
        </div>
        <div class="modal-body" id="shopping-list-content">
          <!-- Populated by JS -->
        </div>
        <div class="modal-footer">
          <button class="btn btn-primary" id="copy-list-btn">Copy to Clipboard</button>
        </div>
      </div>
    </div>

    <!-- ===== HISTORY MODAL ===== -->
    <div class="modal-overlay" id="history-modal-overlay" hidden>
      <div class="modal">
        <div class="modal-header">
          <h2 id="history-modal-title">Past Week Plan</h2>
          <button class="modal-close" id="history-modal-close">&times;</button>
        </div>
        <div class="modal-body" id="history-modal-content">
          <!-- Populated by JS: read-only view of a past week -->
        </div>
        <div class="modal-footer">
          <button class="btn btn-primary" id="copy-week-btn">Copy to Current Week</button>
        </div>
      </div>
    </div>

    <!-- ===== PENDING REVIEW MODAL ===== -->
    <div class="modal-overlay" id="pending-modal-overlay" hidden>
      <div class="modal">
        <div class="modal-header">
          <h2>Recipes to Review</h2>
          <button class="modal-close" id="pending-modal-close">&times;</button>
        </div>
        <div class="modal-body" id="pending-modal-content">
          <!-- Populated by JS -->
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" id="pending-modal-done">Close</button>
        </div>
      </div>
    </div>

    <!-- ===== FOOD REQUEST MODAL ===== -->
    <div class="modal-overlay" id="request-modal-overlay" hidden>
      <div class="modal">
        <div class="modal-header">
          <h2>Request a Food</h2>
          <button class="modal-close" id="request-modal-close">&times;</button>
        </div>
        <div class="modal-body">
          <div class="request-who">
            <label class="request-who-label">
              <input type="radio" name="request-who" value="Dylan" checked> Dyl-Boi
            </label>
            <label class="request-who-label">
              <input type="radio" name="request-who" value="Zoe"> Zbutt
            </label>
          </div>
          <input type="text" id="request-food-input" class="request-food-input"
            placeholder="What do you want to eat?" autocomplete="off">
        </div>
        <div class="modal-footer">
          <button class="btn btn-primary" id="request-modal-submit">Send Request</button>
        </div>
      </div>
    </div>

    <!-- ===== RECIPE DETAIL MODAL ===== -->
    <div class="modal-overlay" id="recipe-modal-overlay" hidden>
      <div class="modal">
        <div class="modal-header">
          <h2 id="recipe-modal-title">Recipe</h2>
          <button class="modal-close" id="recipe-modal-close">&times;</button>
        </div>
        <div class="modal-body" id="recipe-modal-content">
          <!-- Populated by JS: recipe details -->
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" id="recipe-modal-done">Close</button>
        </div>
      </div>
    </div>

    <!-- ===== PERSON SELECTOR MODAL ===== -->
    <div class="modal-overlay" id="person-selector-overlay" hidden>
      <div class="modal person-selector-modal">
        <div class="modal-header">
          <h2>Who are you?</h2>
          <button class="modal-close" id="person-selector-close">&times;</button>
        </div>
        <div class="modal-body person-selector-body">
          <button class="person-btn" data-person="steve">Daddy</button>
          <button class="person-btn" data-person="zoe">Zbutt</button>
          <button class="person-btn" data-person="dylan">Dyl-Boi</button>
        </div>
      </div>
    </div>

  <!-- Week start-day selector — fixed at bottom right, discreet -->
  <div class="start-day-fab">
    <span class="start-day-fab-label">Starts</span>
    <select class="start-day-select" id="start-day-select">
      <option value="mon">Mon</option>
      <option value="tue">Tue</option>
      <option value="wed">Wed</option>
      <option value="thu">Thu</option>
      <option value="fri" selected>Fri</option>
      <option value="sat">Sat</option>
      <option value="sun">Sun</option>
    </select>
  </div>

  <!-- Pending review button — fixed at bottom, discreet -->
  <button class="pending-fab" id="pending-btn" hidden>
    <span id="pending-count">0</span> to review
  </button>

  </div>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
